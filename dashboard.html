<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class=" font-sans antialiased text-slate-800">
    <div class="flex h-screen overflow-hidden">
        <aside id="sidebar"
    class="fixed inset-y-0 left-0 z-30 w-64 bg-[#0f172a] text-slate-400 p-4 transform -translate-x-full transition-transform duration-300 md:relative md:translate-x-0 md:flex md:inset-auto md:z-auto md:shrink-0 flex flex-col">
    
    <div class="flex items-center justify-between mb-6 md:hidden shrink-0">
        <div class="flex items-center gap-3 px-2 py-4">
            <div>📱</div>
            <span class="text-white font-bold text-lg tracking-wide">MobileShop</span>
        </div>
        <button id="sidebar-close-btn"
            class="p-2 rounded-lg bg-slate-800 text-slate-300 hover:bg-slate-700 hover:text-white">
            ✕
        </button>
    </div>

    <div class="w-full flex-1 flex flex-col justify-between overflow-y-auto">
        <div>
            <div class="hidden md:flex items-center gap-3 px-2 py-4 mb-6">
                <div>📱</div>
                <span class="text-white font-bold text-lg tracking-wide">MobileShop</span>
            </div>

            <nav class="space-y-1">
                <p class="px-3 text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">
                    Management
                </p>

                <a href="#"
                    class="flex items-center gap-3 px-3 py-2.5 bg-[#c026d3] text-white font-medium rounded-lg shadow-sm transition-all">
                    Dashboard
                </a>

                <a href="#"
                    class="flex items-center gap-3 px-3 py-2.5 hover:bg-slate-800/60 hover:text-slate-200 rounded-lg transition-all">
                    Products
                </a>

                <a href="#"
                    class="flex items-center gap-3 px-3 py-2.5 hover:bg-slate-800/60 hover:text-slate-200 rounded-lg transition-all">
                    Orders
                </a>

                <a href="#"
                    class="flex items-center gap-3 px-3 py-2.5 hover:bg-slate-800/60 hover:text-slate-200 rounded-lg transition-all">
                    Users
                </a>
            </nav>
        </div>

        <button
            class="py-2.5 px-4 bg-slate-800 hover:bg-slate-700 text-slate-300 hover:text-white rounded-lg border border-slate-700 text-sm font-medium transition-colors mt-auto">
            Logout
        </button>
    </div>
</aside>

        <div id="sidebar-backdrop"
            class="fixed inset-0 bg-slate-900/50 opacity-0 pointer-events-none transition-opacity duration-300 md:hidden">
        </div>

        <main class="bg-slate-300 flex-1 flex flex-col overflow-y-auto">
            <header class="bg-white border-b border-slate-100 py-5 px-6 flex items-center gap-3">
                <button id="sidebar-open-btn"
                    class="md:hidden inline-flex items-center justify-center rounded-lg border border-slate-200 bg-white p-2 text-slate-700 shadow-sm hover:bg-slate-50">
                    <span class="sr-only">Open sidebar</span>
                    <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                        <path fill-rule="evenodd"
                            d="M3 5h14a1 1 0 010 2H3a1 1 0 110-2zm0 4h14a1 1 0 010 2H3a1 1 0 110-2zm0 4h14a1 1 0 010 2H3a1 1 0 110-2z"
                            clip-rule="evenodd" />
                    </svg>
                </button>
                <h1 class="text-xl font-bold text-slate-900">Dashboard</h1>
            </header>

            <div class="p-4 sm:p-6 lg:p-8 space-y-6">
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-5">
                    <div class="bg-white p-5 rounded-xl border border-slate-100 flex items-center gap-4 shadow-sm">
                        <div
                            class="w-12 h-12 rounded-xl bg-emerald-50 text-emerald-600 flex items-center justify-center font-bold text-xl shrink-0">
                            $
                        </div>
                        <div>
                            <p class="text-xs font-medium text-slate-400 uppercase tracking-wider">
                                Total Sales
                            </p>
                            <p class="text-2xl font-bold text-slate-900 mt-0.5">$0.00</p>
                        </div>
                    </div>

                    <div class="bg-white p-5 rounded-xl border border-slate-100 flex items-center gap-4 shadow-sm">
                        <div
                            class="w-12 h-12 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center text-lg shrink-0">
                            🛒
                        </div>
                        <div>
                            <p class="text-xs font-medium text-slate-400 uppercase tracking-wider">
                                Total Orders
                            </p>
                            <p class="text-2xl font-bold text-slate-900 mt-0.5">0</p>
                        </div>
                    </div>

                    <div class="bg-white p-5 rounded-xl border border-slate-100 flex items-center gap-4 shadow-sm">
                        <div
                            class="w-12 h-12 rounded-xl bg-purple-50 text-purple-600 flex items-center justify-center text-lg shrink-0">
                            👥
                        </div>
                        <div>
                            <p class="text-xs font-medium text-slate-400 uppercase tracking-wider">
                                Customers
                            </p>
                            <p class="text-2xl font-bold text-slate-900 mt-0.5">1</p>
                        </div>
                    </div>

                    <div class="bg-white p-5 rounded-xl border border-slate-100 flex items-center gap-4 shadow-sm">
                        <div
                            class="w-12 h-12 rounded-xl bg-rose-50 text-rose-600 flex items-center justify-center text-lg shrink-0">
                            ⚠️
                        </div>
                        <div>
                            <p class="text-xs font-medium text-slate-400 uppercase tracking-wider">
                                Low Stock Items
                            </p>
                            <p class="text-2xl font-bold text-slate-900 mt-0.5">0</p>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-xl border border-slate-100 shadow-sm overflow-hidden">
                    <div class="p-5 border-b border-slate-100 flex justify-between items-center">
                        <h2 class="font-bold text-slate-900 text-base">Recent Orders</h2>
                        <a href="#"
                            class="text-xs font-semibold text-[#c026d3] hover:underline flex items-center gap-1">
                            View all <span class="text-[10px]">»</span>
                        </a>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse min-w-[600px]">
                            <thead>
                                <tr class="bg-slate-100 border-b border-slate-100">
                                    <th class="p-4 text-xs font-bold text-slate-400 uppercase tracking-wider w-1/5">
                                        Order ID
                                    </th>
                                    <th class="p-4 text-xs font-bold text-slate-400 uppercase tracking-wider w-1/5">
                                        Customer
                                    </th>
                                    <th class="p-4 text-xs font-bold text-slate-400 uppercase tracking-wider w-1/5">
                                        Date
                                    </th>
                                    <th class="p-4 text-xs font-bold text-slate-400 uppercase tracking-wider w-1/5">
                                        Total
                                    </th>
                                    <th class="p-4 text-xs font-bold text-slate-400 uppercase tracking-wider w-1/5">
                                        <div class="flex items-center justify-between">
                                            <span>Status</span>
                                            <span class="text-[10px] text-slate-400 font-normal select-none">▲▼</span>
                                        </div>
                                    </th>
                                </tr>
                            </thead>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const sidebar = document.getElementById("sidebar");
const backdrop = document.getElementById("sidebar-backdrop");
const openBtn = document.getElementById("sidebar-open-btn");
const closeBtn = document.getElementById("sidebar-close-btn");

const openSidebar = () => {
    sidebar.classList.remove("-translate-x-full");
    // Add opacity and enable clicks
    backdrop.classList.replace("opacity-0", "opacity-100");
    backdrop.classList.replace("pointer-events-none", "pointer-events-auto");
};

const closeSidebar = () => {
    sidebar.classList.add("-translate-x-full");
    // Remove opacity and disable clicks so you can click the button again
    backdrop.classList.replace("opacity-100", "opacity-0");
    backdrop.classList.replace("pointer-events-auto", "pointer-events-none");
};

openBtn.addEventListener("click", openSidebar);
closeBtn.addEventListener("click", closeSidebar);
backdrop.addEventListener("click", closeSidebar);

document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && !sidebar.classList.contains("-translate-x-full")) {
        closeSidebar();
    }
});
    </script>
</body>

</html>
