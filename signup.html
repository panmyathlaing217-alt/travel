<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sign up</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-3xl shadow-xl w-full max-w-[500px] p-10 flex flex-col items-center">
        
        <img class="w-20" src="img/profile.png" alt="">

        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-slate-800 mb-2">Create Account</h1>
            <p class="text-slate-400 text-sm">Join us today! It only takes a minute.</p>
        </div>

        <form class="w-full flex flex-col gap-5">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="flex flex-col gap-1.5">
                    <label class="text-sm font-bold text-slate-700">Full Name</label>
                    <input type="text" placeholder="John Doe" class="w-full px-4 py-3 border border-slate-100 rounded-xl bg-slate-50 text-sm text-slate-700 placeholder-slate-300 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-sm font-bold text-slate-700">Email Address</label>
                    <input type="email" placeholder="name@company.com" class="w-full px-4 py-3 border border-slate-100 rounded-xl bg-slate-50 text-sm text-slate-700 placeholder-slate-300 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="text-sm font-bold text-slate-700">Password</label>
                <input type="password" placeholder="••••••••" class="w-full px-4 py-3 border border-slate-100 rounded-xl bg-slate-50 text-sm text-slate-700 placeholder-slate-300 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="text-sm font-bold text-slate-700">Confirm Password</label>
                <input type="password" placeholder="••••••••" class="w-full px-4 py-3 border border-slate-100 rounded-xl bg-slate-50 text-sm text-slate-700 placeholder-slate-300 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>

            <div class="flex items-center gap-2 my-2">
                <input type="checkbox" id="terms" class="w-4 h-4 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500">
                <label for="terms" class="text-xs text-slate-500">
                    I agree to the <a href="#" class="text-indigo-600 underline">Terms of Service</a> and <a href="#" class="text-indigo-600 underline">Privacy Policy</a>.
                </label>
            </div>

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3.5 px-4 rounded-xl shadow-lg shadow-indigo-100 transition duration-200">
                Create My Account >>
            </button>
        </form>
        <div class="text-sm text-slate-500 mt-8">
            Already have an account? <a href="signin.html" class="text-indigo-600 font-bold hover:underline">Sign in here</a>
        </div>

    </div>

</body>
</html>
