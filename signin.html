<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="min-h-screen bg-slate-100  flex items-center justify-center p-4 sm:p-6">
        <div class="bg-white rounded-2xl shadow-xl shadow-slate-200/80 w-full max-w-sm sm:max-w-md p-6 sm:p-8 md:p-10 flex flex-col items-center transition-all duration-300">
    
        <img class="w-10 mb-4" src="img/lock.png" alt="">

        <h1 class="text-xl sm:text-2xl font-extrabold text-slate-900 mb-2  text-center">
        Welcome Back
        </h1>
    <p class="text-xs sm:text-sm text-slate-400 text-center mb-6 sm:mb-8 font-medium max-w-xs">
      Enter your credentials to access your account
    </p>

    <form class="w-full space-y-4 sm:space-y-5" onsubmit="">
      
      <div>
        <label class="block text-[10px] sm:text-xs font-bold text-slate-700 uppercase tracking-wide mb-1.5 sm:mb-2" for="email">
          Email Address
        </label>
        <input 
          type="email" 
          id="email" 
          required
          placeholder="name@company.com" 
          class="w-full px-3.5 py-2.5 sm:px-4 sm:py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 text-sm focus:outline-none focus:border-blue-500 focus:bg-white transition-all appearance-none"
        />
      </div>

      <div>
        <label class="block text-[10px] sm:text-xs font-bold text-slate-700 uppercase tracking-wide mb-1.5 sm:mb-2" for="password">
          Password
        </label>
        <input 
          type="password" 
          id="password" 
          required
          placeholder="••••••••" 
          class="w-full px-3.5 py-2.5 sm:px-4 sm:py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 text-sm focus:outline-none focus:border-blue-500 focus:bg-white transition-all appearance-none"
        />
      </div>

      <div class="flex items-center justify-between text-xs font-semibold pt-1">
        <label class="flex items-center text-slate-500 cursor-pointer select-none group">
          <input 
            type="checkbox" 
            class="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500/40 mr-2 cursor-pointer transition-colors" 
          />
          <span class="group-hover:text-slate-700 transition-colors">Remember me</span>
        </label>
        <a href="#" class="text-blue-600 hover:text-blue-700 hover:underline active:text-blue-800 transition-colors">
          Forgot password?
        </a>
      </div>

      <button 
        type="submit" 
        class="w-full mt-2 bg-blue-600 hover:bg-blue-700 active:scale-[0.98] text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-blue-200 hover:shadow-xl hover:shadow-blue-300/40 transition-all flex items-center justify-center gap-2 text-sm cursor-pointer"
      >
        <span>Log In</span>
        <span class="transform translate-x-0 group-hover:translate-x-1 transition-transform">→</span>
      </button>

    </form>

    <p class="mt-8 text-xs text-slate-400 font-medium text-center">
      Don't have an account yet? 
      <a href="signup.html" class="text-blue-600 font-bold hover:text-blue-700 hover:underline inline-block ml-0.5 transition-colors">
        Sign up for free
      </a>
    </p>

  </div>
</div>
</body>
</html>
